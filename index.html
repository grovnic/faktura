<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Faktura - NextGenSolutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-box">
            <h1>⚡ Generator Faktura - NextGenSolutions</h1>

            <div class="controls">
                <select id="lang" onchange="changeLang()">
                    <option value="bs">🇧🇦 Bosanski</option>
                    <option value="en">🇬🇧 English</option>
                </select>
                <button class="secondary" onclick="saveJSON()">📥 Eksportuj JSON</button>
                <button onclick="document.getElementById('loadFile').click()">📤 Importuj JSON</button>
                <button onclick="resetForm()">📄 Novi</button>
                <button class="secondary" onclick="downloadHTML()">💾 Preuzmi HTML</button>
                <input type="file" id="loadFile" class="hidden" accept=".json" onchange="loadJSON(event)">
            </div>
        </div>

        <div class="grid2">
            <div class="app-box">
                <h3>Logo</h3>
                <input type="file" id="logoInput" accept="image/*" onchange="uploadLogo(event)">
                <button class="danger" onclick="removeLogo()" style="margin-top: 10px;">Ukloni</button>
                <div id="logoPreview"></div>
            </div>

            <div class="app-box">
                <h3>Osnovni podaci</h3>
                <label>Tip</label>
                <select id="docType" onchange="render()">
                    <option>Faktura</option>
                    <option>Ponuda</option>
                    <option>Narudžbenica</option>
                </select>
                <div class="grid2" style="margin-top: 10px;">
                    <div>
                        <label>Broj *</label>
                        <input type="text" id="docNum" placeholder="Obavezno" oninput="render()">
                    </div>
                    <div>
                        <label>BF (samo faktura)</label>
                        <input type="text" id="bf" placeholder="Opcionalno" oninput="render()">
                    </div>
                </div>
                <div class="grid2" style="margin-top: 10px;">
                    <div>
                        <label>Datum izdavanja</label>
                        <input type="date" id="dateIssue" value="2025-12-08" oninput="render()">
                    </div>
                    <div>
                        <label>Datum isporuke</label>
                        <input type="date" id="dateDelivery" value="2025-12-08" oninput="render()">
                    </div>
                </div>
            </div>
        </div>

        <div class="grid2">
            <div class="app-box">
                <h3>Prodavač</h3>
                <label>Naziv</label>
                <input type="text" id="sellerName" value="NextGenSolutions d.o.o. Sarajevo" oninput="render()">
                <label>Kontakt osoba</label>
                <input type="text" id="sellerContact" value="Nedim Fejzić" oninput="render()">
                <label>E-mail</label>
                <input type="email" id="sellerEmail" value="info@nextgensolutions.ba" oninput="render()">
                <label>Adresa</label>
                <input type="text" id="sellerAddr" value="Fra Andjela Zvizdovica 1 (PC Unitic)" oninput="render()">
                <div class="grid2" style="margin-top: 10px;">
                    <div>
                        <label>Grad</label>
                        <input type="text" id="sellerCity" value="Sarajevo" oninput="render()">
                    </div>
                    <div>
                        <label>Država</label>
                        <input type="text" id="sellerCountry" value="Bosna i Hercegovina" oninput="render()">
                    </div>
                </div>
                <label>JIB broj</label>
                <input type="text" id="sellerJIB" value="4203549920007" oninput="render()">
                <label>PDV broj</label>
                <input type="text" id="sellerVAT" value="203549920007" placeholder="Opcionalno" oninput="render()">
            </div>

            <div class="app-box">
                <h3>Kupac</h3>
                <label>Naziv</label>
                <input type="text" id="buyerName" placeholder="Naziv kupca" oninput="render()">
                <label>Kontakt osoba</label>
                <input type="text" id="buyerContact" placeholder="Ime i prezime" oninput="render()">
                <label>E-mail</label>
                <input type="email" id="buyerEmail" placeholder="email@example.com" oninput="render()">
                <label>Adresa</label>
                <input type="text" id="buyerAddr" placeholder="Ulica i broj" oninput="render()">
                <div class="grid2" style="margin-top: 10px;">
                    <div>
                        <label>Grad</label>
                        <input type="text" id="buyerCity" placeholder="Grad" oninput="render()">
                    </div>
                    <div>
                        <label>Država</label>
                        <input type="text" id="buyerCountry" placeholder="Država" oninput="render()">
                    </div>
                </div>
                <label>JIB broj</label>
                <input type="text" id="buyerJIB" placeholder="Opcionalno" oninput="render()">
                <label>PDV broj</label>
                <input type="text" id="buyerVAT" placeholder="Opcionalno" oninput="render()">
            </div>
        </div>

        <div class="app-box">
            <h3>Plaćanje</h3>
            <div class="grid2">
                <div>
                    <label>Mjesto</label>
                    <input type="text" id="place" value="Sarajevo" oninput="render()">
                </div>
                <div>
                    <label>Valuta</label>
                    <input type="text" id="curr" value="KM" oninput="render()">
                </div>
            </div>
            <label style="margin-top: 10px;">Uvjeti plaćanja</label>
            <input type="text" id="payTerms" placeholder="Npr. Rok 15 dana" oninput="render()">
        </div>

        <div class="app-box">
            <h3>Stavke</h3>
            <!-- Header za kolone stavki -->
            <div class="item-header">
                <div>R.br.</div>
                <div>Naziv</div>
                <div>Kol.</div>
                <div>J.mj.</div>
                <div>Cijena</div>
                <div>Popust%</div>
                <div>PDV%</div>
                <div></div>
            </div>
            <div id="items"></div>
            <button onclick="addItem()">+ Dodaj stavku</button>
        </div>

        <div class="app-box">
            <h2 style="text-align: center; margin-bottom: 20px;">📄 Pregled fakture</h2>
            <div id="preview"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
