<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Faktura - NextGenSolutions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .box {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        h2 {
            color: #444;
            margin-bottom: 15px;
        }
        h3 {
            color: #555;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover {
            opacity: 0.9;
        }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-yellow { background: #f59e0b; color: white; }
        select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .grid3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        .grid4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        textarea {
            font-family: Arial, sans-serif;
            resize: vertical;
        }
        .stavka {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 60px;
            gap: 10px;
            margin-bottom: 10px;
            align-items: end;
        }
        .stavka input {
            margin-bottom: 0;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
            height: 42px;
            padding: 0;
        }
        .preview {
            padding: 40px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 8px;
            min-height: 700px;
        }
        .doc-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 20px;
            margin-bottom: 25px;
            border-bottom: 3px solid #000;
        }
        .doc-header h2 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }
        .logo-img {
            max-width: 180px;
            max-height: 90px;
        }
        .parties {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 25px 0;
        }
        .party {
            padding: 20px;
            background: #f9f9f9;
            border-left: 5px solid #3b82f6;
            border-radius: 5px;
        }
        .party h4 {
            color: #3b82f6;
            margin: 0 0 12px 0;
            font-size: 15px;
            letter-spacing: 1px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
        }
        th, td {
            border: 2px solid #000;
            padding: 12px;
            text-align: left;
        }
        th {
            background: #000;
            color: white;
            font-weight: 600;
            font-size: 13px;
        }
        .totals {
            text-align: right;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            margin: 20px 0;
        }
        .totals p {
            margin: 10px 0;
            font-size: 16px;
        }
        .totals h3 {
            color: #10b981;
            font-size: 26px;
            margin: 15px 0 0 0;
        }
        .amount-words {
            background: #fef3c7;
            padding: 18px;
            border-radius: 8px;
            border-left: 5px solid #f59e0b;
            margin: 25px 0;
            font-size: 15px;
        }
        .footer-text {
            text-align: center;
            margin-top: 50px;
            padding-top: 25px;
            border-top: 2px solid #ccc;
            font-size: 11px;
            color: #666;
            line-height: 1.6;
        }
        .logo-section {
            padding: 20px;
            background: #eff6ff;
            border-radius: 8px;
        }
        #logoDisplay {
            max-width: 200px;
            max-height: 100px;
            margin-top: 15px;
            border: 2px solid #ddd;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>⚡ Generator Faktura/Ponuda/Narudžbenica</h1>
            <p style="text-align: center; color: #666;">NextGenSolutions d.o.o. Sarajevo</p>
        </div>

        <div class="box">
            <div class="toolbar">
                <select id="languageSelect">
                    <option value="bs">🇧🇦 Bosanski</option>
                    <option value="en">🇬🇧 English</option>
                </select>
                <button class="btn-green" onclick="exportJSON()">📥 Eksportuj JSON</button>
                <button class="btn-yellow" onclick="document.getElementById('importFile').click()">📤 Importuj JSON</button>
                <button class="btn-blue" onclick="newDocument()">📄 Novi</button>
                <button class="btn-green" onclick="exportHTML()">💾 Preuzmi HTML</button>
            </div>
            <input type="file" id="importFile" class="hidden" accept=".json">
        </div>

        <div class="box logo-section">
            <label><strong>Logo kompanije</strong></label>
            <input type="file" id="logoFile" accept="image/*" style="margin-top: 10px;">
            <button class="btn-yellow" onclick="deleteLogo()" style="margin-top: 10px;">Ukloni logo</button>
            <div id="logoContainer"></div>
        </div>

        <div class="grid2">
            <div class="box">
                <h3>Podaci prodavača</h3>
                <label>Naziv</label>
                <input type="text" id="sellerName" value="NextGenSolutions d.o.o. Sarajevo" readonly>
                <label>Adresa</label>
                <textarea id="sellerAddr" rows="2" readonly>Fra Andjela Zvizdovica 1 (PC Unitic)
Sarajevo, Bosna i Hercegovina</textarea>
                <label>JIB/ID</label>
                <input type="text" id="sellerJIB" value="4203549920007" readonly>
                <label>Broj računa</label>
                <input type="text" id="sellerBank" value="134 105 112 002 8469" readonly>
            </div>
            <div class="box">
                <h3>Podaci kupca</h3>
                <label>Naziv</label>
                <input type="text" id="buyerName" placeholder="Naziv kupca">
                <label>Adresa</label>
                <input type="text" id="buyerAddr" placeholder="Adresa">
                <label>PDV broj</label>
                <input type="text" id="buyerVAT" placeholder="Opcionalno">
            </div>
        </div>

        <div class="box">
            <h3>Osnovni podaci</h3>
            <div class="grid4" style="margin-bottom: 15px;">
                <div>
                    <label>Tip dokumenta</label>
                    <select id="docType">
                        <option>Faktura</option>
                        <option>Ponuda</option>
                        <option>Narudžbenica</option>
                    </select>
                </div>
                <div>
                    <label>Broj</label>
                    <input type="text" id="docNumber" value="001/2025">
                </div>
                <div>
                    <label>Datum izdavanja</label>
                    <input type="date" id="issueDate" value="2025-12-08">
                </div>
                <div>
                    <label>Datum isporuke</label>
                    <input type="date" id="deliveryDate" value="2025-12-08">
                </div>
            </div>
            <div class="grid3">
                <div>
                    <label>Mjesto</label>
                    <input type="text" id="place" value="Sarajevo">
                </div>
                <div>
                    <label>Uvjeti plaćanja</label>
                    <input type="text" id="paymentTerms" placeholder="Npr. Rok 15 dana">
                </div>
                <div>
                    <label>Valuta</label>
                    <input type="text" id="currency" value="KM">
                </div>
            </div>
        </div>

        <div class="box">
            <h3>Stavke</h3>
            <div id="itemsContainer"></div>
            <button class="btn-blue" onclick="addNewItem()">+ Dodaj stavku</button>
        </div>

        <div class="box">
            <h2 style="text-align: center; margin-bottom: 25px;">📄 Pregled dokumenta</h2>
            <div class="preview" id="previewArea">
                <p style="text-align: center; color: #999;">Priprema pregleda...</p>
            </div>
        </div>
    </div>

    <script>
        // Globalne varijable
        var currentLang = 'bs';
        
        var translations = {
            bs: {
                num: 'Broj',
                placeDate: 'Mjesto i datum izdavanja',
                deliveryDate: 'Datum isporuke/usluge',
                seller: 'PRODAVAČ',
                buyer: 'KUPAC',
                taxID: 'JIB',
                bank: 'Broj računa',
                vat: 'PDV',
                item: 'Artikl/Usluga',
                qty: 'Količina',
                unit: 'J.mj.',
                price: 'Cijena bez PDV',
                itemTotal: 'Ukupno bez PDV',
                subtotal: 'Ukupno bez PDV',
                vatAmount: 'PDV 17%',
                grandTotal: 'UKUPNO ZA PLAĆANJE',
                amountWords: 'Iznos slovima',
                paymentTerms: 'Uvjeti plaćanja',
                footer: 'Privredni subjekat registrovan je kod Općinskog suda u Sarajevu sa matičnim brojem 65–01–0803-25.'
            },
            en: {
                num: 'Number',
                placeDate: 'Place and date of issue',
                deliveryDate: 'Date of delivery/service',
                seller: 'SELLER',
                buyer: 'BUYER',
                taxID: 'Tax ID',
                bank: 'Bank Account',
                vat: 'VAT',
                item: 'Item/Service',
                qty: 'Quantity',
                unit: 'Unit',
                price: 'Price excl. VAT',
                itemTotal: 'Total excl. VAT',
                subtotal: 'Amount excl. VAT',
                vatAmount: 'VAT 17%',
                grandTotal: 'TOTAL AMOUNT DUE',
                amountWords: 'Amount in words',
                paymentTerms: 'Payment terms',
                footer: 'Business entity registered with the Municipal Court in Sarajevo under registration number 65–01–0803-25.'
            }
        };

        // Funkcija za konverziju broja u tekst
        function numberToText(num) {
            if (num === 0) return currentLang === 'bs' ? 'nula' : 'zero';
            
            var whole = Math.floor(num);
            var decimal = Math.round((num - whole) * 100);
            var result = '';
            
            if (currentLang === 'bs') {
                var units = ['', 'jedan', 'dva', 'tri', 'četiri', 'pet', 'šest', 'sedam', 'osam', 'devet'];
                var tens = ['', 'deset', 'dvadeset', 'trideset', 'četrdeset', 'pedeset', 'šezdeset', 'sedamdeset', 'osamdeset', 'devedeset'];
                var teens = ['deset', 'jedanaest', 'dvanaest', 'trinaest', 'četrnaest', 'petnaest', 'šesnaest', 'sedamnaest', 'osamnaest', 'devetnaest'];
                var hundreds = ['', 'sto', 'dvjesto', 'tristo', 'četiristo', 'petsto', 'šeststo', 'sedamsto', 'osamsto', 'devetsto'];
                
                if (whole >= 1000) {
                    var thousands = Math.floor(whole / 1000);
                    if (thousands === 1) {
                        result += 'jedna hiljada ';
                    } else {
                        result += units[thousands] + ' hiljade ';
                    }
                    whole = whole % 1000;
                }
                
                if (whole >= 100) {
                    result += hundreds[Math.floor(whole / 100)] + ' ';
                    whole = whole % 100;
                }
                
                if (whole >= 20) {
                    result += tens[Math.floor(whole / 10)] + ' ';
                    whole = whole % 10;
                } else if (whole >= 10) {
                    result += teens[whole - 10] + ' ';
                    whole = 0;
                }
                
                if (whole > 0) {
                    result += units[whole] + ' ';
                }
                
                if (decimal > 0) {
                    result += 'i ' + decimal + '/100';
                }
            } else {
                var unitsEn = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
                var tensEn = ['', 'ten', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
                var teensEn = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
                
                if (whole >= 1000) {
                    var thousandsEn = Math.floor(whole / 1000);
                    result += unitsEn[thousandsEn] + ' thousand ';
                    whole = whole % 1000;
                }
                
                if (whole >= 100) {
                    result += unitsEn[Math.floor(whole / 100)] + ' hundred ';
                    whole = whole % 100;
                }
                
                if (whole >= 20) {
                    result += tensEn[Math.floor(whole / 10)] + ' ';
                    whole = whole % 10;
                } else if (whole >= 10) {
                    result += teensEn[whole - 10] + ' ';
                    whole = 0;
                }
                
                if (whole > 0) {
                    result += unitsEn[whole] + ' ';
                }
                
                if (decimal > 0) {
                    result += 'and ' + decimal + '/100';
                }
            }
            
            return result.trim();
        }

        // Dodavanje nove stavke
        function addNewItem(name, qty, unit, price) {
            name = name || '';
            qty = qty || 1;
            unit = unit || 'kom';
            price = price || 0;
            
            var itemDiv = document.createElement('div');
            itemDiv.className = 'stavka';
            itemDiv.innerHTML = '<input type="text" placeholder="Naziv" value="' + name + '">' +
                '<input type="number" value="' + qty + '" step="any">' +
                '<input type="text" value="' + unit + '">' +
                '<input type="number" value="' + price + '" step="0.01">' +
                '<button class="btn-delete" onclick="removeItem(this)">✖</button>';
            
            document.getElementById('itemsContainer').appendChild(itemDiv);
            
            var inputs = itemDiv.querySelectorAll('input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].addEventListener('input', updatePreview);
            }
            
            updatePreview();
        }

        // Uklanjanje stavke
        function removeItem(button) {
            button.parentElement.remove();
            updatePreview();
        }

        // Ažuriranje pregleda
        function updatePreview() {
            var t = translations[currentLang];
            var logo = localStorage.getItem('companyLogo');
            
            var subtotal = 0;
            var tableRows = '';
            
            var items = document.querySelectorAll('.stavka');
            for (var i = 0; i < items.length; i++) {
                var inputs = items[i].querySelectorAll('input');
                var itemName = inputs[0].value;
                var itemQty = parseFloat(inputs[1].value) || 0;
                var itemUnit = inputs[2].value;
                var itemPrice = parseFloat(inputs[3].value) || 0;
                var itemTotal = itemQty * itemPrice;
                
                subtotal += itemTotal;
                
                tableRows += '<tr>' +
                    '<td>' + itemName + '</td>' +
                    '<td>' + itemQty + '</td>' +
                    '<td>' + itemUnit + '</td>' +
                    '<td>' + itemPrice.toFixed(2) + '</td>' +
                    '<td>' + itemTotal.toFixed(2) + '</td>' +
                    '</tr>';
            }
            
            var vatAmount = subtotal * 0.17;
            var grandTotal = subtotal + vatAmount;
            var amountInWords = numberToText(grandTotal);
            
            var previewHTML = '<div class="doc-header">' +
                '<div>' +
                '<h2>' + document.getElementById('docType').value.toUpperCase() + ' ' + t.num + '. ' + document.getElementById('docNumber').value + '</h2>' +
                '<p><strong>' + t.placeDate + ':</strong> ' + document.getElementById('place').value + ', ' + document.getElementById('issueDate').value + '</p>' +
                '<p><strong>' + t.deliveryDate + ':</strong> ' + document.getElementById('deliveryDate').value + '</p>' +
                '</div>' +
                (logo ? '<div><img class="logo-img" src="' + logo + '"></div>' : '') +
                '</div>' +
                '<div class="parties">' +
                '<div class="party">' +
                '<h4>' + t.seller + '</h4>' +
                '<p><strong>' + document.getElementById('sellerName').value + '</strong><br>' +
                document.getElementById('sellerAddr').value.replace(/\n/g, '<br>') + '<br>' +
                t.taxID + ': ' + document.getElementById('sellerJIB').value + '<br>' +
                t.bank + ': ' + document.getElementById('sellerBank').value + '</p>' +
                '</div>' +
                '<div class="party">' +
                '<h4>' + t.buyer + '</h4>' +
                '<p><strong>' + (document.getElementById('buyerName').value || 'N/A') + '</strong><br>' +
                (document.getElementById('buyerAddr').value || '') + '<br>' +
                (document.getElementById('buyerVAT').value ? t.vat + ': ' + document.getElementById('buyerVAT').value : '') + '</p>' +
                '</div>' +
                '</div>' +
                '<table>' +
                '<thead><tr>' +
                '<th>' + t.item + '</th>' +
                '<th>' + t.qty + '</th>' +
                '<th>' + t.unit + '</th>' +
                '<th>' + t.price + '</th>' +
                '<th>' + t.itemTotal + '</th>' +
                '</tr></thead>' +
                '<tbody>' + tableRows + '</tbody>' +
                '</table>' +
                '<div class="totals">' +
                '<p><strong>' + t.subtotal + ':</strong> ' + subtotal.toFixed(2) + ' ' + document.getElementById('currency').value + '</p>' +
                '<p><strong>' + t.vatAmount + ':</strong> ' + vatAmount.toFixed(2) + ' ' + document.getElementById('currency').value + '</p>' +
                '<h3>' + t.grandTotal + ': ' + grandTotal.toFixed(2) + ' ' + document.getElementById('currency').value + '</h3>' +
                '</div>' +
                '<div class="amount-words">' +
                '<strong>' + t.amountWords + ':</strong> ' + amountInWords + ' ' + document.getElementById('currency').value +
                '</div>' +
                '<p><strong>' + t.paymentTerms + ':</strong> ' + (document.getElementById('paymentTerms').value || 'N/A') + '</p>' +
                '<div class="footer-text">' + t.footer + '</div>';
            
            document.getElementById('previewArea').innerHTML = previewHTML;
        }

        // Eksport HTML
        function exportHTML() {
            var previewContent = document.getElementById('previewArea').innerHTML;
            var fullHTML = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + 
                document.getElementById('docType').value + ' ' + document.getElementById('docNumber').value + 
                '</title><style>body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;padding:20px;}' +
                '.doc-header{display:flex;justify-content:space-between;padding-bottom:20px;margin-bottom:25px;border-bottom:3px solid #000;}' +
                '.doc-header h2{font-size:24px;margin:0 0 10px 0;}.logo-img{max-width:180px;max-height:90px;}' +
                '.parties{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin:25px 0;}' +
                '.party{padding:20px;background:#f9f9f9;border-left:5px solid #3b82f6;}.party h4{color:#3b82f6;margin:0 0 12px 0;}' +
                'table{width:100%;border-collapse:collapse;margin:25px 0;}th,td{border:2px solid #000;padding:12px;}' +
                'th{background:#000;color:white;}.totals{text-align:right;padding:20px;background:#f9f9f9;margin:20px 0;}' +
                '.totals h3{color:#10b981;font-size:26px;}.amount-words{background:#fef3c7;padding:18px;border-left:5px solid #f59e0b;margin:25px 0;}' +
                '.footer-text{text-align:center;margin-top:50px;padding-top:25px;border-top:2px solid #ccc;font-size:11px;color:#666;}' +
                '@media print{body{padding:15px;}@page{margin:2cm;}}</style></head><body>' + 
                previewContent + '</body></html>';
            
            var blob = new Blob([fullHTML], {type: 'text/html;charset=utf-8'});
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = document.getElementById('docType').value + '_' + 
                document.getElementById('docNumber').value.replace(/\//g, '_') + '.html';
            link.click();
            URL.revokeObjectURL(url);
            alert('✅ HTML dokument preuzet!');
        }

        // Eksport JSON
        function exportJSON() {
            var items = [];
            var itemElements = document.querySelectorAll('.stavka');
            for (var i = 0; i < itemElements.length; i++) {
                var inputs = itemElements[i].querySelectorAll('input');
                items.push({
                    name: inputs[0].value,
                    qty: parseFloat(inputs[1].value),
                    unit: inputs[2].value,
                    price: parseFloat(inputs[3].value)
                });
            }
            
            var data = {
                lang: currentLang,
                type: document.getElementById('docType').value,
                number: document.getElementById('docNumber').value,
                issueDate: document.getElementById('issueDate').value,
                deliveryDate: document.getElementById('deliveryDate').value,
                place: document.getElementById('place').value,
                payment: document.getElementById('paymentTerms').value,
                currency: document.getElementById('currency').value,
                buyer: {
                    name: document.getElementById('buyerName').value,
                    address: document.getElementById('buyerAddr').value,
                    vat: document.getElementById('buyerVAT').value
                },
                items: items
            };
            
            var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = data.type + '_' + data.number.replace(/\//g, '_') + '.json';
            link.click();
            URL.revokeObjectURL(url);
        }

        // Import JSON
        function importJSON(event) {
            var file = event.target.files[0];
            if (!file) return;
            
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    
                    currentLang = data.lang || 'bs';
                    document.getElementById('languageSelect').value = currentLang;
                    document.getElementById('docType').value = data.type || 'Faktura';
                    document.getElementById('docNumber').value = data.number || '';
                    document.getElementById('issueDate').value = data.issueDate || '';
                    document.getElementById('deliveryDate').value = data.deliveryDate || '';
                    document.getElementById('place').value = data.place || 'Sarajevo';
                    document.getElementById('paymentTerms').value = data.payment || '';
                    document.getElementById('currency').value = data.currency || 'KM';
                    document.getElementById('buyerName').value = data.buyer.name || '';
                    document.getElementById('buyerAddr').value = data.buyer.address || '';
                    document.getElementById('buyerVAT').value = data.buyer.vat || '';
                    
                    document.getElementById('itemsContainer').innerHTML = '';
                    if (data.items && data.items.length > 0) {
                        for (var i = 0; i < data.items.length; i++) {
                            addNewItem(data.items[i].name, data.items[i].qty, data.items[i].unit, data.items[i].price);
                        }
                    } else {
                        addNewItem();
                    }
                    
                    alert('✅ Dokument učitan!');
                } catch (err) {
                    alert('❌ Greška: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // Novi dokument
        function newDocument() {
            if (confirm('Kreirati novi dokument?')) {
                document.getElementById('buyerName').value = '';
                document.getElementById('buyerAddr').value = '';
                document.getElementById('buyerVAT').value = '';
                document.getElementById('paymentTerms').value = '';
                document.getElementById('itemsContainer').innerHTML = '';
                addNewItem();
            }
        }

        // Logo funkcije
        function showLogo() {
            var logo = localStorage.getItem('companyLogo');
            var container = document.getElementById('logoContainer');
            if (logo) {
                container.innerHTML = '<img id="logoDisplay" src="' + logo + '">';
            } else {
                container.innerHTML = '';
            }
        }

        function deleteLogo() {
            if (confirm('Ukloniti logo?')) {
                localStorage.removeItem('companyLogo');
                showLogo();
                updatePreview();
            }
        }

        // Event listeners
        document.getElementById('languageSelect').addEventListener('change', function() {
            currentLang = this.value;
            updatePreview();
        });

        document.getElementById('logoFile').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(event) {
                    localStorage.setItem('companyLogo', event.target.result);
                    showLogo();
                    updatePreview();
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('importFile').addEventListener('change', importJSON);

        var formFields = ['docType', 'docNumber', 'issueDate', 'deliveryDate', 'place', 'paymentTerms', 'currency', 'buyerName', 'buyerAddr', 'buyerVAT'];
        for (var i = 0; i < formFields.length; i++) {
            document.getElementById(formFields[i]).addEventListener('input', updatePreview);
        }

        // Inicijalizacija
        showLogo();
        addNewItem();
        updatePreview();
    </script>
</body>
</html>
